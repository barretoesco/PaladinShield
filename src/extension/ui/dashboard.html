<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PaladinShield | Evidencia</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
        color: #e9f2ff;
        background: radial-gradient(circle at 15% 10%, #3f1020 0%, #120914 35%, #080a13 100%);
        padding: 28px;
      }
      .glow {
        position: fixed;
        inset: -25%;
        filter: blur(34px);
        pointer-events: none;
        background:
          radial-gradient(circle at 20% 30%, rgba(255, 41, 102, 0.25), transparent 44%),
          radial-gradient(circle at 80% 70%, rgba(0, 201, 255, 0.18), transparent 46%);
      }
      .shell {
        position: relative;
        z-index: 1;
        max-width: 980px;
        margin: 0 auto;
      }
      .hero {
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 18px 20px;
        margin-bottom: 16px;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.45);
      }
      .title {
        margin: 0;
        font-size: 24px;
      }
      .subtitle {
        margin: 8px 0 0;
        color: #b6c2d4;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 12px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 120, 140, 0.5);
        background: rgba(255, 65, 115, 0.18);
        color: #ffd2df;
        font-weight: 600;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #ff3566;
        box-shadow: 0 0 14px #ff3566;
      }
      .panel {
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        background: rgba(11, 18, 34, 0.58);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 16px;
      }
      .meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 12px;
      }
      .meta-item {
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        padding: 10px;
        background: rgba(255, 255, 255, 0.04);
      }
      .meta-key {
        display: block;
        color: #98a9bf;
        font-size: 12px;
      }
      .meta-value {
        margin-top: 4px;
        font-weight: 600;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(0, 0, 0, 0.35);
        color: #d8e9ff;
        padding: 12px;
        max-height: 56vh;
        overflow: auto;
        line-height: 1.4;
      }
      .upload-state {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.05);
      }
      .spinner {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.25);
        border-top-color: #6fe2ff;
        animation: spin 900ms linear infinite;
      }
      .upload-state.ready .spinner {
        animation: none;
        border: 2px solid rgba(84, 233, 170, 0.4);
        border-top-color: #54e9aa;
        background: rgba(84, 233, 170, 0.3);
      }
      .upload-label {
        color: #d7e4f7;
        font-size: 13px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (max-width: 760px) {
        .meta {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <main class="shell">
      <section class="hero">
        <h1 class="title">Amenaza Detectada y Reportada</h1>
        <p class="subtitle">
          Evidencia local lista para auditoria y futura publicacion en registro inmutable de Solana.
        </p>
        <span class="status"><span class="dot"></span>Prueba de Concepto Activa</span>
      </section>

      <section class="panel">
        <div id="upload-state" class="upload-state">
          <span class="spinner"></span>
          <span id="upload-label" class="upload-label">Subiendo a la Blockchain de Solana...</span>
        </div>
        <div class="meta">
          <div class="meta-item">
            <span class="meta-key">Reporte ID</span>
            <span class="meta-value" id="report-id">-</span>
          </div>
          <div class="meta-item">
            <span class="meta-key">Fecha</span>
            <span class="meta-value" id="report-date">-</span>
          </div>
          <div class="meta-item">
            <span class="meta-key">Historial Local</span>
            <span class="meta-value" id="history-size">0 eventos</span>
          </div>
        </div>
        <pre id="payload-json">Cargando evidencia...</pre>
      </section>
    </main>

    <script type="module" src="./dashboard.js"></script>
  </body>
</html>
